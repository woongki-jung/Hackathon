name: CI

on:
  push:
    branches: [main]
    paths:
      - 'domain-dictionary/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'domain-dictionary/**'
      - '.github/workflows/**'

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: domain-dictionary

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: domain-dictionary/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci_db?sslmode=disable
          POSTGRES_URL_NON_POOLING: postgresql://ci:ci@localhost:5432/ci_db?sslmode=disable
          SESSION_SECRET: ci-build-secret-for-type-check-only-32ch
          ADMIN_USERNAME: ci_admin
          ADMIN_PASSWORD: Ci@dmin#1
          GEMINI_API_KEY: dummy-key-for-build
          GEMINI_MODEL: gemini-2.0-flash

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: domain-dictionary/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: domain-dictionary
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: domain-dictionary
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: domain-dictionary
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

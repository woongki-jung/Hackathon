name: CI

on:
  push:
    branches: [main]
    paths:
      - 'domain-dictionary/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'domain-dictionary/**'
      - '.github/workflows/**'

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: domain-dictionary

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: domain-dictionary/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci_db?sslmode=disable
          POSTGRES_URL_NON_POOLING: postgresql://ci:ci@localhost:5432/ci_db?sslmode=disable
          SESSION_SECRET: ci-build-secret-for-type-check-only-32ch
          ADMIN_USERNAME: ci_admin
          ADMIN_PASSWORD: Ci@dmin#1
          GEMINI_API_KEY: dummy-key-for-build
          GEMINI_MODEL: gemini-2.0-flash
